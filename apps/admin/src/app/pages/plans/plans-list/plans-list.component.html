<div class="container">
  <div class="flex items-center">
    <h1 class="text-2xl font-bold mb-4 flex-1">Planes</h1>
    <a routerLink="/home/plans/create" class="btn">Crear Plan</a>
  </div>

  @if (loading()) {
    <div class="flex justify-center items-center py-8">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
    </div>
  } @else if (error()) {
    <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded mb-4">
      {{ error() }}
    </div>
  } @else if (plans().length === 0) {
    <div class="text-center text-slate-500 py-8">No hay planes registrados.</div>
  } @else {
    <div class="overflow-x-auto rounded-lg border border-slate-300 overflow-hidden mt-14">
      <table cdk-table [dataSource]="plans()" class="min-w-full bg-slate-50">
        <ng-container cdkColumnDef="name">
          <th cdk-header-cell *cdkHeaderCellDef class="px-6 py-4 text-left font-semibold text-slate-700">Nombre</th>
          <td cdk-cell *cdkCellDef="let row" class="px-6 py-4 align-middle text-slate-700 bg-white font-medium">
            {{ row.name }}
          </td>
        </ng-container>

        <ng-container cdkColumnDef="cost">
          <th cdk-header-cell *cdkHeaderCellDef class="px-6 py-4 text-left font-semibold text-slate-700">Costo</th>
          <td cdk-cell *cdkCellDef="let row" class="px-6 py-4 align-middle text-slate-700 bg-white">
            {{ row.cost }} {{ row.currency }}
          </td>
        </ng-container>

        <ng-container cdkColumnDef="isActive">
          <th cdk-header-cell *cdkHeaderCellDef class="px-6 py-4 text-left font-semibold text-slate-700">Estado</th>
          <td cdk-cell *cdkCellDef="let row" class="px-6 py-4 align-middle text-slate-700 bg-white">
            <span
              class="inline-block rounded-full text-xs px-3 py-1 font-semibold"
              [class]="row.active ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'"
            >
              {{ row.active ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
        </ng-container>

        <ng-container cdkColumnDef="actions">
          <th cdk-header-cell *cdkHeaderCellDef class="px-6 py-4 text-center font-semibold text-slate-700">Acciones</th>
          <td cdk-cell *cdkCellDef="let row" class="px-6 py-4 align-middle bg-white">
            <div class="flex justify-center gap-2">
              <button [routerLink]="['/home/plans', row.id]" class="cursor-pointer p-1 hover:bg-gray-100 rounded">
                <span class="material-symbols-rounded text-blue-600">edit</span>
              </button>
              <button (click)="onDeletePlan(row)" class="cursor-pointer p-1 hover:bg-gray-100 rounded">
                <span class="material-symbols-rounded text-red-600">delete</span>
              </button>
            </div>
          </td>
        </ng-container>

        <tr cdk-header-row *cdkHeaderRowDef="displayedColumns" class="bg-slate-100"></tr>
        <tr
          cdk-row
          *cdkRowDef="let row; columns: displayedColumns"
          class="border-b border-slate-300 last:border-b-0"
        ></tr>
      </table>
    </div>
  }
</div>
