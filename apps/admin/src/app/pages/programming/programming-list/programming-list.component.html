<div class="container">
  <div class="flex items-center mb-6">
    <h1 class="text-2xl font-bold flex-1">Programación</h1>
    <button class="btn" routerLink="/home/programming/create">Crear programación</button>
  </div>

  @if (isLoading()) {
    <div class="flex justify-center items-center py-8">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
    </div>
  }

  @if (!isLoading() && hasClasses()) {
    <div class="bg-white rounded-lg shadow-lg p-4">
      <ui-class-week-calendar
        [slots]="classSlots()"
        (slotClick)="onSlotClick($event)"
      ></ui-class-week-calendar>
    </div>
  }

  @if (!isLoading() && !hasClasses()) {
    <div class="text-center text-slate-500 py-8">
      <div class="text-6xl mb-4">📅</div>
      <h3 class="text-lg font-semibold mb-2">No hay clases programadas</h3>
      <p class="text-sm">No se encontraron clases programadas para esta instalación.</p>
    </div>
  }
</div>
