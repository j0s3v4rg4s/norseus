<div class="flex flex-col p-6 w-lg relative">
  <button
    class="absolute top-4 right-4"
    (click)="onCancel()"
    [disabled]="isSaving"
    type="button"
    aria-label="Cerrar modal"
  >
    <span class="material-symbols-rounded">close</span>
  </button>

  <div class="flex items-center mb-6">
    <h2 class="text-xl font-bold">Editar horario</h2>
  </div>

  <form [formGroup]="form" class="space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div class="grid gap-3">
        <label for="startTime" class="label">Hora de inicio</label>
        <input
          class="input"
          formControlName="startTime"
          type="time"
          [attr.aria-invalid]="form.get('startTime')?.invalid && form.get('startTime')?.touched"
        />
      </div>

      <div class="grid gap-3">
        <label for="duration" class="label">Duración del servicio (minutos)</label>
        <input
          class="input"
          type="number"
          id="duration"
          formControlName="duration"
          [attr.aria-invalid]="form.get('duration')?.invalid && form.get('duration')?.touched"
        />
      </div>
    </div>

    <div class="grid gap-3">
      <label for="capacity" class="label">Capacidad</label>
      <input
        class="input"
        formControlName="capacity"
        type="number"
        min="1"
        [attr.aria-invalid]="form.get('capacity')?.invalid && form.get('capacity')?.touched"
      />
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div class="grid gap-3">
        <label for="minReserveMinutes" class="label">Reserva mínima (minutos)</label>
        <input
          class="input"
          formControlName="minReserveMinutes"
          type="number"
          min="0"
          [attr.aria-invalid]="form.get('minReserveMinutes')?.invalid && form.get('minReserveMinutes')?.touched"
        />
      </div>

      <div class="grid gap-3">
        <label for="minCancelMinutes" class="label">Cancelación mínima (minutos)</label>
        <input
          class="input"
          formControlName="minCancelMinutes"
          type="number"
          min="0"
          [attr.aria-invalid]="form.get('minCancelMinutes')?.invalid && form.get('minCancelMinutes')?.touched"
        />
      </div>
    </div>

    <div class="flex items-center gap-2">
      <input
        type="checkbox"
        formControlName="isActive"
        id="isActive"
        class="w-4 h-4 text-primary-600 bg-gray-100 border-gray-300 rounded focus:ring-primary-500"
      />
      <label for="isActive" class="text-sm font-medium text-gray-700">Horario activo</label>
    </div>
    @if (errorMessage()) {
      <p class="text-red-500 text-sm">{{ errorMessage() }}</p>
    }
  </form>

  <div class="flex gap-3 mt-6 flex-row-reverse">
    <button class="btn" (click)="onSave()" [disabled]="form.invalid" ui-button [isLoading]="isSaving">Guardar</button>
    <button class="btn-destructive" (click)="onDelete()" [disabled]="isSaving">Eliminar</button>
  </div>
</div>
