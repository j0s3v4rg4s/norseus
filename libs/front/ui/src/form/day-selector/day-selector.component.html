<div
  class="flex gap-2 flex-wrap"
  role="group"
  aria-label="Selector de días">
  @for (day of displayDays(); track day) {
    <button
      type="button"
      [id]="uniqueId + '-' + day"
      [disabled]="disabled()"
      (click)="toggleDay(day)"
      [attr.aria-pressed]="isDaySelected(day)"
      [attr.aria-label]="getDayLabel(day)"
      [class]="'w-12 h-12 rounded-full flex items-center justify-center text-sm font-medium transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-ring ' +
        (isDaySelected(day)
          ? 'bg-primary text-primary-foreground border-2 border-primary'
          : 'bg-white text-foreground border-2 border-border hover:border-primary hover:bg-accent') +
        (disabled() ? ' opacity-50 cursor-not-allowed' : '')">
      {{ getDayLabel(day) }}
    </button>
  }
</div>
