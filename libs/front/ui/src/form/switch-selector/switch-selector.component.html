<div
  class="relative inline-flex items-center bg-muted rounded-full h-10 shadow-inner parent-container"
  role="radiogroup"
  [attr.aria-disabled]="disabled()"
>
  <div
    class="absolute h-12 z-0 bg-primary rounded-full transition-transform duration-300 ease-in-out"
    [style.transform]="'translateX(' + selectedOffset() + 'px)'"
    [style.width.px]="selectedWidth()"
  ></div>

  @for (option of options(); track option.value) {
    <button
      type="button"
      role="radio"
      [id]="uniqueId + '_' + option.value"
      class="cursor-pointer relative z-10 px-2 h-full rounded-full flex items-center justify-center text-sm font-medium transition-colors duration-200"
      [disabled]="disabled()"
      (click)="selectOption(option)"
      [attr.aria-checked]="isSelected(option)"
      [attr.aria-label]="option.name"
      [class.text-primary-foreground]="isSelected(option)"
      [class.text-foreground]="!isSelected(option)"
      [class.cursor-not-allowed]="disabled()"
      [class.opacity-50]="disabled()"
    >
      {{ option.name }}
    </button>
  }
</div>
