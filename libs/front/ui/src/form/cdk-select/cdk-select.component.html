<button
  type="button"
  class="flex h-9 w-full items-center justify-between rounded-md border border-input bg-transparent px-3 py-1 text-base shadow-xs transition-all focus-visible:outline-none focus-visible:ring-[3px] focus-visible:ring-ring/50 focus-visible:border-ring disabled:cursor-not-allowed disabled:opacity-50 md:text-sm dark:bg-input/30 aria-invalid:border-destructive aria-invalid:ring-destructive/20"
  role="combobox"
  [id]="triggerId"
  [attr.aria-haspopup]="'listbox'"
  [attr.aria-expanded]="isOpen()"
  [attr.aria-controls]="panelId"
  [attr.aria-activedescendant]="activeDescendantId()"
  [attr.aria-invalid]="hasError()"
  [disabled]="disabled()"
  (click)="toggle()"
  (keydown)="handleTriggerKeydown($event)"
  #trigger>
  <span class="flex-1 text-left truncate">
    @if (displayValue(); as display) {
      {{ display }}
    } @else {
      <span class="text-muted-foreground">{{ placeholder() }}</span>
    }
  </span>
  <span class="material-symbols-rounded text-muted-foreground">
    unfold_more
  </span>
</button>

<ng-template #panelTemplate>
  <div
    [id]="panelId"
    class="w-full max-h-64 overflow-y-auto p-1 border border-border rounded-md shadow-lg bg-popover"
    role="listbox"
    [attr.aria-labelledby]="triggerId"
    (keydown)="handlePanelKeydown($event)">
    <ng-content select="ui-cdk-option"></ng-content>
  </div>
</ng-template>
